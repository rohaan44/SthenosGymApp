
name: app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  sizer: ^3.1.3
  cloudinary_public: ^0.23.1
  http: ^1.6.0
  image_picker: ^1.2.2
  permission_handler: ^11.3.1
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  responsive_framework: ^1.5.1
  # camera: ^0.12.0+1
  another_flushbar: ^1.12.30
  universal_html: ^2.3.0
  flutter_svg: ^2.2.3
  flutter_launcher_icons: ^0.14.4
  pdf: ^3.11.0
  printing: ^5.13.4
  blue_thermal_printer: ^1.2.3
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  camera: ^0.11.2
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/png/title_logo1.png"

  web:
    generate: true
    image_path: "assets/images/png/title_logo1.png"
    background_color: "#151515"
    theme_color: "#E53935"
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/png/
    - assets/images/svg/
    - assets/images/receipt_logo.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Black.ttf
          weight: 900
        - asset: assets/fonts/Lato-Light.ttf
          weight: 300
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
